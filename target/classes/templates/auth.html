<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentification - Biblio</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="auth-wrapper">
    <div class="glass-card">

        <!-- LOGIN FORM -->
        <th:block th:if="${action == 'login'}">
            <h1 class="auth-title">Connexion</h1>
            <p class="auth-subtitle">Accédez à votre espace</p>
            <div th:if="${success_msg}" class="alert alert-success" th:text="${success_msg}"></div>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <form method="POST" th:action="@{/auth/login}">
                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
                    <button type="button" class="password-toggle">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <button type="submit" class="btn btn-primary">Se connecter</button>
            </form>
            <div class="auth-links">
                <p>Pas de compte ? <a th:href="@{/auth/register}">S'inscrire</a></p>
            </div>
        </th:block>

        <!-- REGISTER FORM -->
        <th:block th:if="${action == 'register'}">
            <h1 class="auth-title">Inscription</h1>
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            <form method="POST" th:action="@{/auth/register}">
                <div style="display:flex; gap:1rem; margin-bottom:1rem;">
                    <input type="text" name="prenom" class="form-control" placeholder="Prénom" required>
                    <input type="text" name="nom" class="form-control" placeholder="Nom" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="tel" name="telephone" class="form-control" placeholder="Téléphone">
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="form-control" placeholder="Mot de passe" required>
                    <button type="button" class="password-toggle">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    </button>
                </div>
                <div class="form-group">
                    <input type="password" name="password_confirm" class="form-control" placeholder="Confirmer le mot de passe" required>
                </div>
                <button type="submit" class="btn btn-primary">Créer mon compte</button>
            </form>
            <div class="auth-links">
                <p>Déjà inscrit ? <a th:href="@{/auth/login}">Connexion</a></p>
            </div>
        </th:block>

    </div>
</div>
</body>
</html>
